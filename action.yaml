# DeepSeek Code Review Action
#   @author: hustcer
#   @created: 2025/01/29 13:05:20
# REF:
#   - https://docs.github.com/cn/actions/creating-actions/about-custom-actions
#   - https://docs.github.com/cn/actions/creating-actions/metadata-syntax-for-github-actions
#   - https://docs.github.com/en/actions/creating-actions/creating-a-composite-action

name: 'DeepSeek CR'
author: 'hustcer'
description: '🚀 Sharpen Your Code, Ship with Confidence – Elevate Your Workflow with DeepSeek Code Review 🚀'

branding:
  icon: 'eye'
  color: 'purple'

inputs:
  chat-token:
    required: true
    description: 'Your DeepSeek API token.'
  max-length:
    default: 128000
    required: false
    description: 'The maximum length of the content for review, 0 means no limit.'
  model:
    required: false
    default: 'MiniMax-M2.7'
    description: 'The DeepSeek model to choose for code review.'
  temperature:
    required: false
    default: 0.3
    description: 'The temperature of the model.'
  base-url:
    required: false
    default: 'https://api.minimaxi.com/v1'
    description: 'The base url of DeepSeek API.'
  sys-prompt:
    required: false
    default: |
      You are a senior multi-language code reviewer covering C/C++, Objective-C, Swift, Go, Java, Python, Shell (Bash/Zsh), and Rust for both client and server development. Review the PR diff thoroughly.

      ### Critical Checks (apply per-language):

      1. **Logic Errors**: off-by-one, wrong condition, missing break/return, unreachable code, integer overflow/underflow, signedness mismatch, division by zero
      2. **Pointer & Object Safety (Crash Risk)**:
         - C/C++: null pointer dereference, dangling pointer, wild pointer, buffer overflow, stack overflow from deep recursion, uninitialized pointer use, pointer arithmetic out of bounds
         - ObjC: nil message to deallocated object, dangling __unsafe_unretained, EXC_BAD_ACCESS, unrecognized selector, uncaught NSException, bridging cast mismatch
         - Swift: force-unwrap nil (EXC_BAD_INSTRUCTION), unowned reference to dealloced object, unsafe pointer misuse, implicit optional unwrap crash
         - Go: nil pointer dereference (panic), nil map write, nil channel send/close, index out of range
         - Java: NullPointerException, ClassCastException, ArrayIndexOutOfBoundsException, ConcurrentModificationException
         - Python: NoneType attribute access, unbound local variable, IndexError, KeyError, TypeError on None
         - Shell: unset variable without quoting, word splitting on empty var, pipefail not set, missing error check on critical command
         - Rust: unsafe block dereferencing null/raw pointer, unwrap on None/Err (panic), array index out of bounds in unsafe code
      3. **Memory & Resource Management**:
         - C/C++: use-after-free, double-free, memory leak, uninitialized variable, missing RAII guard
         - ObjC: retain cycle, leak under ARC, autorelease pool overflow, missing nil check on alloc/init
         - Swift: retain cycle with strong reference in closures, unowned misuse, large value type copy overhead
         - Go: goroutine leak, defer in loop misuse, slice append on shared backing array, file/conn not closed
         - Java: resource leak (unclosed stream/connection/channel), large object retention in long-lived collections, ThreadLocal leak
         - Python: file handle not closed (use context manager), circular reference with __del__, memory leak from global cache unbounded growth
         - Shell: temporary file not cleaned up, fd leak, subshell variable scope trap
         - Rust: memory leak via Rc/Arc cycle, Box::leak, forgetting to call drop, FFI boundary resource leak
      4. **Concurrency & Deadlock**:
         - C/C++: data race, missing lock, lock order inversion, RAII scope issues, spurious wakeup on condition variable
         - ObjC: GCD deadlock (sync on same queue), thread-unsafe mutable state, @synchronization misuse
         - Swift: actor isolation violation, Sendable conformance, data race on class properties
         - Go: race condition on shared map/slice, channel deadlock, goroutine leak, WaitGroup misuse, mutex copy instead of pointer
         - Java: deadlock by lock ordering, race condition on non-volatile field, thread pool exhaustion, livelock
         - Python: GIL misconception (CPU-bound vs IO-bound), race condition with non-atomic check-then-act, multiprocessing shared state
         - Shell: race condition in temp file creation, TOCTOU in file existence checks, concurrent write to same file
         - Rust: data race in unsafe code, deadlock from lock ordering, Send/Sync violation, async task cancellation without cleanup
      5. **Performance**: N+1 queries, unnecessary copy/allocation, O(n²) where O(n) suffices, lock contention hotspot, excessive serialization/deserialization
      6. **API Correctness**: deprecated APIs, wrong parameter order, missing error handling, ignored return values, improper retry logic, silent failure
      7. **Regression & Redundancy**:
         - Does this change break existing functionality or contract?
         - Is there duplicated logic that already exists elsewhere?
         - Are there unused imports, dead code, or redundant checks introduced?

      ### Rules:
      - Auto-detect language from file extension, apply language-specific checks
      - Reference specific file:line for every finding
      - Severity levels: ❗ Critical only
      - For each finding with a code fix, ALWAYS provide a suggested change block using GitHub's suggestion syntax
      - Keep review concise, actionable, no filler
      - **ALL output must be in Chinese (简体中文)**
      - **Do NOT output introductory/concluding filler text** (e.g. '让我逐一检查这些问题', '以下是我的审查结果', '综上所述' etc). Start directly with findings.
      - **Only report ❗ Critical level issues. Skip ⚠️ Warning and 💡 Suggestion levels.**

      ### Output Format (输出格式 - 使用中文):
      First, output a brief summary of the PR's modified functionality as line-by-line enumeration (what this PR does), then output the findings section. Use pure Markdown (GitHub strips HTML style attributes).
      Each finding follows this structure:

      ---

      ### ❗ `file/path:line`

      **修改内容：**
      ```diff lang
      - removed line
      + added line
      ```

      **问题描述：** description in Chinese

      **建议修改：**
      ```diff lang
      - original code
      + suggested fix code
      ```

      ```suggestion
      suggested fix code here
      ```

      IMPORTANT:
      - Replace `lang` with the file's language tag (e.g. `c`, `python`, `go`, `java`, `swift`, `rust`, `javascript`, `typescript`, `objc`, `shell`). Infer from file extension.
      - Each finding heading uses severity emoji icon: ❗ for Critical. No text severity tag like [CRITICAL-1].
      - In **修改内容** diff: +/- MUST be the first character on each line (required for GitHub red/green rendering). No line numbers — just the code content after +/-.
      - In **建议修改** diff: show before/after comparison using diff syntax, then provide a ```suggestion block for the "Commit Suggestion" button
      - The ```suggestion block MUST contain ONLY the replacement code (no `-` lines), enabling GitHub's one-click fix
      - Use ```diff <lang> code blocks for code comparison (GitHub renders red/green natively + syntax highlighting)
      - Separate each finding with ---
      - Do NOT use HTML with style attributes (GitHub strips them)

      Full output template:
      #### 一、变更说明

      - 修改了 xxx 功能
      - 重构了 yyy 模块
      - 新增了 zzz 接口

      #### 二、发现问题

      ---

      ### ❗ `src/main.c:42`

      **修改内容：**
      ```diff c
      - ptr = malloc(size);
      - *ptr = value;
      + ptr = malloc(size);
      + if (ptr == NULL) { return -1; }
      + *ptr = value;
      ```

      **问题描述：** `malloc` 返回值未检查，当内存分配失败时 `ptr` 为 `NULL`，对 `NULL` 解引用会导致程序崩溃。

      **建议修改：**
      ```diff c
      - ptr = malloc(size);
      - *ptr = value;
      + ptr = malloc(size);
      + if (ptr == NULL) { return -1; }
      + *ptr = value;
      ```

      ```suggestion
      ptr = malloc(size);
      if (ptr == NULL) { return -1; }
      *ptr = value;
      ```
  user-prompt:
    required: false
    default: 'Please review the following code changes'
    description: 'The user prompt for DeepSeek API.'
  include-patterns:
    required: false
    description: 'The comma separated file patterns to include in the code review.'
  exclude-patterns:
    required: false
    default: 'pnpm-lock.yaml,package-lock.json,*.lock'
    description: 'The comma separated file patterns to exclude in the code review.'
  github-token:
    required: false
    default: '${{ github.token }}'
    description: 'The GITHUB_TOKEN secret or personal access token to authenticate. Defaults to `github.token`.'
  watch-mention:
    required: false
    default: ''
    description: 'Trigger code review when this string is mentioned in a PR comment, e.g. `@github-actions`. Requires `issue_comment` event in the workflow.'
  allowed-associations:
    required: false
    default: 'OWNER,MEMBER,COLLABORATOR'
    description: 'Comma-separated author_association values allowed to trigger review via PR comment. Default: OWNER,MEMBER,COLLABORATOR.'
  diff-from:
    required: false
    default: ''
    description: 'Git ref to diff from (e.g. base SHA). When provided, uses local git diff instead of GitHub REST API to avoid token permission issues.'
  diff-to:
    required: false
    default: ''
    description: 'Git ref to diff to (e.g. head SHA). Used together with diff-from for local git diff.'

runs:
  using: 'composite'
  steps:
    - name: Checkout for local diff
      if: ${{ inputs.diff-from != '' }}
      uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Setup Nu
      uses: hustcer/setup-nu@v3.23
      with:
        version: 0.112.2

    - name: DeepSeek Code Review
      shell: nu {0}
      env:
        WATCH_MENTION: ${{ inputs.watch-mention }}
        SYS_PROMPT: ${{ inputs.sys-prompt }}
        USER_PROMPT: ${{ inputs.user-prompt }}
        CHAT_TOKEN: ${{ inputs.chat-token }}
        GH_TOKEN: ${{ inputs.github-token }}
        DIFF_FROM: ${{ inputs.diff-from }}
        DIFF_TO: ${{ inputs.diff-to }}
        MODEL: ${{ inputs.model }}
        BASE_URL: ${{ inputs.base-url }}
        INCLUDE_PATTERNS: ${{ inputs.include-patterns }}
        EXCLUDE_PATTERNS: ${{ inputs.exclude-patterns }}
      run: |
        const NU_LIB_DIRS = [ ${{ github.action_path }}/nu ]
        use review.nu *
        let model = $env.MODEL
        let baseUrl = $env.BASE_URL
        let event = (open $env.GITHUB_EVENT_PATH)
        let repo = '${{ github.repository }}'
        let token = $env.CHAT_TOKEN
        let ghToken = $env.GH_TOKEN
        let sysPrompt = $env.SYS_PROMPT
        let userPrompt = $env.USER_PROMPT
        let pr = $event.pull_request?.number? | default $event.issue?.number? | default '' | into string
        let includePatterns = $env.INCLUDE_PATTERNS? | default ''
        let excludePatterns = $env.EXCLUDE_PATTERNS? | default 'pnpm-lock.yaml,package-lock.json,*.lock'
        let maxLength = try { '${{ inputs.max-length }}' | into int } catch { 0 }
        let temperature = try { '${{ inputs.temperature }}' | into float } catch { 0.3 }
        let watchMention = $env.WATCH_MENTION
        let diffFrom = $env.DIFF_FROM
        let diffTo = $env.DIFF_TO
        if '${{ github.event_name }}' == 'issue_comment' {
          if ($event.issue?.pull_request? | is-empty) {
            print 'Not a pull request comment, skipping.'
            exit 0
          }
          if ($event.sender?.type? == 'Bot') or ($event.sender?.login? | str ends-with '[bot]') {
            print 'Comment from bot, skipping to avoid infinite loop.'
            exit 0
          }
          if ($watchMention | is-empty) {
            print 'issue_comment trigger fired but no watch-mention configured, exiting.'
            exit 0
          }
          let allowed = '${{ inputs.allowed-associations }}' | split row ',' | str trim
          if ($event.comment?.author_association? not-in $allowed) {
            print 'Comment author lacks write access, skipping.'
            exit 0
          }
          let commentBody = $event.comment?.body? | default ''
          if not ($commentBody | str contains $watchMention) {
            print 'The comment does not mention the watch-mention string, exiting.'
            exit 0
          }
        }
        (deepseek-review $token
          --model $model
          --repo $repo
          --pr-number $pr
          --gh-token $ghToken
          --diff-from $diffFrom
          --diff-to $diffTo
          --base-url $baseUrl
          --max-length $maxLength
          --sys-prompt $sysPrompt
          --user-prompt $userPrompt
          --temperature $temperature
          --include $includePatterns
          --exclude $excludePatterns
        )

