# Description:
#   - AI code review with GitHub Actions
#   - Model, sys-prompt, output format are configured in action.yaml defaults
#   - To customize, pass model/base-url/sys-prompt as `with` parameters

name: Code Review
on:
  pull_request_target:
    types:
      # - opened      # Triggers when a PR is opened
      # - reopened    # Triggers when a PR is reopened
      # - synchronize # Triggers when a commit is pushed to the PR
      - labeled   # Triggers when a label is added to the PR
  issue_comment:
    types:
      - created     # Triggers when a comment is created on a PR

# fix: GraphQL: Resource not accessible by integration (addComment) error
permissions:
  contents: read
  pull-requests: write

jobs:
  setup-deepseek-review:
    runs-on: rtc
    name: Code Review
    # Make sure the code review happens only when the PR has the label 'ai review'
    if: contains(github.event.pull_request.labels.*.name, 'ai review')
    steps:
      - name: AI Code Review
        uses: aopacloud/rtc-ai-codereview@main
        with:
          # Use git diff instead of REST API to bypass GITHUB_TOKEN permission issues in private repos
          diff-from: ${{ github.event.pull_request.base.sha }}
          diff-to: ${{ github.event.pull_request.head.sha }}
          watch-mention: '@github-actions'
          # Store the chat token in GitHub Secrets, don't expose it in the workflow file
          chat-token: ${{ secrets.CHAT_TOKEN }}
